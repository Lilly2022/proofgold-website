    <path d="M56 92 L56 60 L50 46 L56 60 L56 12 C56 9, 58 8, 60 8 L88 8 C91 8, 92 9, 92 12 L92 92 C92 95, 91 96, 88 96 L60 96 C57 96, 56 95, 56 92 Z" fill="#D4AF37"/>
