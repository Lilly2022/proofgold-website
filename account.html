<style>
:root{--bg:#0a0a0f;--surface:#12121a;--surface2:#1a1a25;--border:#252535;--text:#e8e8ed;--text2:#8888a0;--gold:#D4AF37;--gold2:#b8912e;--blue:#5B9CF6;--green:#3DDC84;--red:#FF6B6B;--orange:#d48a3a;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'SF Pro Text',-apple-system,system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6;}
a{color:var(--gold);text-decoration:none;}

/* NAV */
.nav{display:flex;align-items:center;justify-content:space-between;padding:16px 32px;border-bottom:1px solid var(--border);background:var(--surface);}
.nav-logo{display:flex;align-items:center;gap:10px;font-weight:700;font-size:15px;letter-spacing:0.5px;color:var(--gold);}
.nav-logo svg{width:28px;height:28px;}
.nav-links{display:flex;gap:20px;font-size:13px;}
.nav-links a{color:var(--text2);transition:color 0.2s;}
.nav-links a:hover{color:var(--text);}
