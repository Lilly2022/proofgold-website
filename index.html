<style>
:root {
  --gold: #D4AF37;
  --gold-dim: #C9A84C;
  --gold-glow: rgba(212,175,55,0.15);
  --gold-bright: #E8C55A;
  --bg: #08080C;
  --bg2: #0D0D14;
  --bg3: #12121C;
  --text: #F0EDE6;
  --text-body: rgba(240,237,230,0.80);
  --text-secondary: rgba(240,237,230,0.55);
  --text-muted: rgba(240,237,230,0.35);

  --red: #FF6B6B;
  --blue: #5B9CF6;
  --border: rgba(212,175,55,0.08);
  --radius: 20px;
  /* TYPE SCALE — 6 steps only */
  --text-sm: 15px;
  --text-base: 18px;
  --text-lg: 22px;
  --text-xl: 28px;
  --space-sm: 12px;
  --space-md: 24px;
  --space-lg: 48px;
  --space-xl: 72px;

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; -webkit-font-smoothing: antialiased; }
::selection { background: var(--gold); color: #000; }
body { font-family: 'DM Sans', -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); font-size: var(--text-base); line-height: 1.7; }

a:hover { color: var(--gold-bright); }
