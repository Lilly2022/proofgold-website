<!--
  Proof Gold Support Chat Widget
  Add this before </body> on proof.trading
  
  Update SUPPORT_API_URL to your Vercel deployment URL.
-->
<div id="pg-chat-widget"></div>
<script>
(function() {
  const SUPPORT_API_URL = "https://proof.trading/v1/support";
  
  const CSS = `
    #pg-chat-toggle { position:fixed; bottom:24px; right:24px; width:56px; height:56px; border-radius:50%; background:#D4AF37; border:none; cursor:pointer; z-index:9999; display:flex; align-items:center; justify-content:center; box-shadow:0 4px 20px rgba(0,0,0,0.3); transition:transform 0.2s; }
    #pg-chat-toggle:hover { transform:scale(1.08); }
    #pg-chat-toggle svg { width:24px; height:24px; fill:#000; }
    #pg-chat-box { position:fixed; bottom:92px; right:24px; width:380px; max-height:520px; background:#0A1628; border:1px solid rgba(42,107,204,0.15); border-radius:16px; z-index:9999; display:none; flex-direction:column; overflow:hidden; box-shadow:0 8px 40px rgba(0,0,0,0.5); font-family:'Outfit',sans-serif; }
    #pg-chat-box.open { display:flex; }
    .pg-header { padding:16px 20px; background:#0F1D32; border-bottom:1px solid rgba(42,107,204,0.1); display:flex; align-items:center; gap:10px; }
    .pg-header-dot { width:8px; height:8px; border-radius:50%; background:#34C759; }
    .pg-header-text { color:#f5f5f7; font-size:14px; font-weight:600; }
    .pg-header-sub { color:rgba(245,245,247,0.4); font-size:11px; }
    .pg-messages { flex:1; overflow-y:auto; padding:16px; max-height:360px; }
    .pg-msg { margin-bottom:12px; max-width:85%; }
    .pg-msg-bot { margin-right:auto; }
    .pg-msg-user { margin-left:auto; }
    .pg-msg-bubble { padding:10px 14px; border-radius:12px; font-size:13px; line-height:1.5; }
    .pg-msg-bot .pg-msg-bubble { background:#0F1D32; color:rgba(245,245,247,0.8); border-bottom-left-radius:4px; }
    .pg-msg-user .pg-msg-bubble { background:#D4AF37; color:#000; border-bottom-right-radius:4px; }
    .pg-input-area { padding:12px 16px; border-top:1px solid rgba(42,107,204,0.1); display:flex; gap:8px; }
    .pg-input { flex:1; background:#0F1D32; border:1px solid rgba(42,107,204,0.1); border-radius:8px; padding:10px 14px; color:#f5f5f7; font-size:13px; font-family:inherit; outline:none; }
    .pg-input:focus { border-color:rgba(212,175,55,0.3); }
    .pg-send { background:#D4AF37; border:none; border-radius:8px; padding:10px 16px; cursor:pointer; color:#000; font-weight:600; font-size:13px; font-family:inherit; }
    .pg-send:hover { background:#F0D060; }
    .pg-send:disabled { opacity:0.5; cursor:not-allowed; }
    .pg-typing { color:rgba(245,245,247,0.3); font-size:12px; padding:4px 0; }
  `;

  const style = document.createElement("style");
  style.textContent = CSS;
  document.head.appendChild(style);

  const container = document.getElementById("pg-chat-widget");
  container.innerHTML = `
    <button id="pg-chat-toggle">
      <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H6l-2 2V4h16v12z"/></svg>
    </button>
    <div id="pg-chat-box">
      <div class="pg-header">
        <span class="pg-header-dot"></span>
        <div>
          <div class="pg-header-text">Proof Gold Support</div>
          <div class="pg-header-sub">AI assistant — typically replies instantly</div>
        </div>
      </div>
      <div class="pg-messages" id="pg-messages">
        <div class="pg-msg pg-msg-bot">
          <div class="pg-msg-bubble">Hey! I'm the Proof Gold support assistant. I can help with installation, settings, troubleshooting, and account questions. What's up?</div>
        </div>
      </div>
      <div class="pg-input-area">
        <input class="pg-input" id="pg-input" placeholder="Type your question..." />
        <button class="pg-send" id="pg-send">Send</button>
      </div>
    </div>
  `;

  let conversationId = null;
  const toggle = document.getElementById("pg-chat-toggle");
  const box = document.getElementById("pg-chat-box");
  const input = document.getElementById("pg-input");
  const sendBtn = document.getElementById("pg-send");
  const messages = document.getElementById("pg-messages");

  toggle.onclick = () => box.classList.toggle("open");

  function addMessage(text, isUser) {
    const div = document.createElement("div");
    div.className = `pg-msg pg-msg-${isUser ? "user" : "bot"}`;
    div.innerHTML = `<div class="pg-msg-bubble">${text.replace(/\n/g, "<br>")}</div>`;
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
  }

  async function send() {
    const msg = input.value.trim();
    if (!msg) return;

    addMessage(msg, true);
    input.value = "";
    sendBtn.disabled = true;

    // Show typing
    const typing = document.createElement("div");
    typing.className = "pg-typing";
    typing.textContent = "Thinking...";
    messages.appendChild(typing);
    messages.scrollTop = messages.scrollHeight;

    try {
      const res = await fetch(SUPPORT_API_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          message: msg,
          conversation_id: conversationId,
        }),
      });

      const data = await res.json();
      typing.remove();

      conversationId = data.conversation_id;
      addMessage(data.reply || "Sorry, I couldn't process that. Please email support@proof.trading", false);

    } catch (err) {
      typing.remove();
      addMessage("Connection error. Please email support@proof.trading", false);
    }

    sendBtn.disabled = false;
    input.focus();
  }

  sendBtn.onclick = send;
  input.onkeydown = (e) => { if (e.key === "Enter") send(); };
})();
</script>
